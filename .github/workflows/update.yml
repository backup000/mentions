name: Update Reddit Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # Updated to v4 to clear the Node.js warning

    - name: Set up Python
      uses: actions/setup-python@v5  # Updated to v5 to clear the Node.js warning
      with:
        python-version: '3.10'  # Fixed typo here!

    - name: Install dependencies
      run: pip install requests

    - name: Run script
      env:
        REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
        REDDIT_SECRET: ${{ secrets.REDDIT_SECRET }}
      run: python fetch_data.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add data.json
        git commit -m "Automated data refresh" || exit 0
        git push
