<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>r/hyrox Brand Tracker</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js for Interactive Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-10 border-b border-slate-800 pb-6">
            <h1 class="text-3xl font-bold text-white mb-2">🏃‍♂️ r/hyrox Brand Tracker</h1>
            <p class="text-slate-400" id="last-updated">Loading live tracking data...</p>
        </header>

        <!-- Metrics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Garmin Mentions (Last Month)</h3>
                <p class="text-5xl font-extrabold text-blue-400 mt-2" id="garmin-total">-</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Amazfit Mentions (Last Month)</h3>
                <p class="text-5xl font-extrabold text-rose-400 mt-2" id="amazfit-total">-</p>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="grid grid-cols-1 gap-8">
            <!-- Sentiment Chart -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                <h3 class="text-lg font-bold text-white mb-4">Community Sentiment Breakdown</h3>
                <div class="h-64 flex items-center justify-center">
                    <canvas id="sentimentChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart Configuration Script -->
    <script>
        // Fetch the live data generated by the Python script
        fetch('./data.json')
            .then(response => {
                if (!response.ok) throw new Error("Network response was not ok");
                return response.json();
            })
            .then(data => {
                // Update timestamp
                document.getElementById('last-updated').innerText = `Live tracking Garmin vs. Amazfit. Last Updated: ${data.last_updated}`;

                // Update Metric Cards
                document.getElementById('garmin-total').innerText = data.garmin.total;
                document.getElementById('amazfit-total').innerText = data.amazfit.total;

                // Common chart options
                const chartOptions = {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#cbd5e1' } } },
                    scales: {
                        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' }, beginAtZero: true }
                    }
                };

                // Render Sentiment Bar Chart with real data
                new Chart(document.getElementById('sentimentChart'), {
                    type: 'bar',
                    data: {
                        labels: ['Garmin', 'Amazfit'],
                        datasets: [
                            { label: 'Positive', data: [data.garmin.sentiment.positive, data.amazfit.sentiment.positive], backgroundColor: '#10b981' },
                            { label: 'Neutral', data: [data.garmin.sentiment.neutral, data.amazfit.sentiment.neutral], backgroundColor: '#64748b' },
                            { label: 'Negative', data: [data.garmin.sentiment.negative, data.amazfit.sentiment.negative], backgroundColor: '#ef4444' }
                        ]
                    },
                    options: chartOptions
                });
            })
            .catch(err => {
                console.error("Error loading live data:", err);
                document.getElementById('last-updated').innerText = "⚠️ Error loading live data. Please check the console.";
            });
    </script>
</body>
</html>
