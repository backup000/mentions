<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>r/hyrox Brand Tracker</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js for Interactive Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-10 border-b border-slate-800 pb-6">
            <h1 class="text-3xl font-bold text-white mb-2">🏃‍♂️ r/hyrox Brand Tracker</h1>
            <p class="text-slate-400">Comparing marketing capture and sentiment for Garmin vs. Amazfit.</p>
        </header>

        <!-- Metrics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Garmin Mentions (90 Days)</h3>
                <p class="text-5xl font-extrabold text-blue-400 mt-2">45</p>
                <span class="text-xs text-slate-500 mt-1 block">Avg: ~1 mention every 2 days</span>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Amazfit Mentions (90 Days)</h3>
                <p class="text-5xl font-extrabold text-rose-400 mt-2">6</p>
                <span class="text-xs text-slate-500 mt-1 block">Avg: ~1 mention every 2 weeks</span>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Timeline Chart -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                <h3 class="text-lg font-bold text-white mb-4">Mention Volume (Weekly Trend)</h3>
                <div class="h-64 flex items-center justify-center">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <!-- Sentiment Chart -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                <h3 class="text-lg font-bold text-white mb-4">Community Sentiment Breakdown</h3>
                <div class="h-64 flex items-center justify-center">
                    <canvas id="sentimentChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart Configuration Script -->
    <script>
        // Common configuration options for dark mode grids
        const chartOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#cbd5e1' } } },
            scales: {
                x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' }, beginAtZero: true }
            }
        };

        // 1. Trend Line Chart
        new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: {
                labels: ['Wk 1', 'Wk 2', 'Wk 3', 'Wk 4', 'Wk 5', 'Wk 6', 'Wk 7', 'Wk 8'],
                datasets: [
                    { label: 'Garmin', data: [4, 5, 3, 6, 4, 5, 7, 5], borderColor: '#38bdf8', tension: 0.2 },
                    { label: 'Amazfit', data: [0, 1, 0, 0, 1, 0, 1, 0], borderColor: '#f43f5e', tension: 0.2 }
                ]
            },
            options: chartOptions
        });

        // 2. Sentiment Bar Chart
        new Chart(document.getElementById('sentimentChart'), {
            type: 'bar',
            data: {
                labels: ['Garmin', 'Amazfit'],
                datasets: [
                    { label: 'Positive', data: [28, 1], backgroundColor: '#10b981' },
                    { label: 'Neutral', data: [12, 1], backgroundColor: '#64748b' },
                    { label: 'Negative/Critical', data: [5, 4], backgroundColor: '#ef4444' }
                ]
            },
            options: chartOptions
        });
    </script>
</body>
</html>
